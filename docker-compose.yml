services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: strategy-tracking-system:latest
    container_name: tracking-app
    env_file:
      - .env
    environment:
      TZ: Asia/Almaty
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - ./data:/app/data:rw
